services:
  api1:
    build:
      context: .
      dockerfile: eSale.Api/Dockerfile
    container_name: esale-api-1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      seq:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Infrastructure__RunDbInitialization: "true"
      Infrastructure__RunHangfireServer: "true"
      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};
      ConnectionStrings__Redis: redis:6379
      Seq__ServerUrl: http://seq:5341
    restart: unless-stopped
    volumes:
      - esale-logs:/app/logs

  api2:
    build:
      context: .
      dockerfile: eSale.Api/Dockerfile
    container_name: esale-api-2
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      seq:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Infrastructure__RunDbInitialization: "false"
      Infrastructure__RunHangfireServer: "false"
      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};
      ConnectionStrings__Redis: redis:6379
      Seq__ServerUrl: http://seq:5341
    restart: unless-stopped
    volumes:
      - esale-logs:/app/logs

  mysql:
    image: mysql:8.4
    container_name: esale-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: esale-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  seq:
    image: datalust/seq:2024.3
    container_name: esale-seq
    environment:
      ACCEPT_EULA: "Y"
    restart: unless-stopped
    ports:
      - "${SEQ_PORT:-5341}:80"
    volumes:
      - seq-data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: esale-nginx
    depends_on:
      - api1
      - api2
    ports:
      - "${NGINX_PORT:-8080}:80"
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mysql-data:
  seq-data:
  esale-logs:
